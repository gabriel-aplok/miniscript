name: CI

on:
  create: # Triggers when tags are created
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  Build_Windows:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Project
        run: dotnet build -c Release --no-restore

      # - name: Build Packages
      #   run: dotnet pack MiniScript.csproj -c Release --no-restore --no-build

      - name: List Packages
        run: ls -R bin/Release/

      # - name: Publish to nuget.org
      #   if: startsWith(github.ref, 'refs/tags/')
      #   run: dotnet nuget push bin\Release\*.nupkg -s https://api.nuget.org/v3/index.json --api-key ${{secrets.NUGET_KEY}} --skip-duplicate
